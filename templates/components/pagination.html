{% if total_pages is defined and total_pages > 1 %}
<nav class="mt-6 flex justify-center space-x-2">
    {% for p in range(1, total_pages + 1) %}
    <a href="?page={{ p }}"
       class="px-3 py-1 rounded {% if p == page %}bg-indigo-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700{% endif %}"
       hx-get="?page={{ p }}" hx-target="#content" hx-push-url="true">
        {{ p }}
    </a>
    {% endfor %}
</nav>
{% endif %}
