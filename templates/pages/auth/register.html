{% extends "layout.html" %}
{% block title %}Register - Boilerworks{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <img src="/static/images/logo-dark.svg" alt="Boilerworks" class="h-12 mx-auto mb-4">
            <h1 class="text-2xl font-bold">Create account</h1>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            {% if error %}
            <div class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-200 text-sm">{{ error }}</div>
            {% endif %}
            <form method="post" action="/register">
                <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token | default('') }}">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Display name</label>
                    <input type="text" name="display_name" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition-colors">Register</button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-500">
                Have an account? <a href="/login" class="text-indigo-400 hover:text-indigo-300">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
