{% extends "layout.html" %}
{% block title %}{{ category.name }} - Boilerworks{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">{{ category.name }}</h1>
    <div class="space-x-2">
        <a href="/categories/{{ category.id }}/edit" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition-colors">Edit</a>
        <a href="/categories" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition-colors">Back</a>
    </div>
</div>
<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 max-w-2xl">
    <dl class="space-y-4">
        <div><dt class="text-sm text-gray-400">Description</dt><dd class="text-gray-100">{{ category.description or '-' }}</dd></div>
    </dl>
</div>
{% endblock %}
