<div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
    <table class="w-full">
        <thead class="bg-gray-800/50">
            <tr>
                <th class="text-left px-4 py-3 text-sm text-gray-400 font-medium">Name</th>
                <th class="text-left px-4 py-3 text-sm text-gray-400 font-medium">SKU</th>
                <th class="text-left px-4 py-3 text-sm text-gray-400 font-medium">Price</th>
                <th class="text-left px-4 py-3 text-sm text-gray-400 font-medium">Category</th>
                <th class="text-right px-4 py-3 text-sm text-gray-400 font-medium">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
            {% for item in items %}
            <tr id="item-{{ item.id }}" class="hover:bg-gray-800/30">
                <td class="px-4 py-3"><a href="/items/{{ item.id }}" class="text-indigo-400 hover:text-indigo-300">{{ item.name }}</a></td>
                <td class="px-4 py-3 text-gray-400 text-sm">{{ item.sku }}</td>
                <td class="px-4 py-3 text-gray-300">${{ "%.2f"|format(item.price) }}</td>
                <td class="px-4 py-3 text-gray-400 text-sm">{{ item.category.name if item.category else '-' }}</td>
                <td class="px-4 py-3 text-right space-x-2">
                    <a href="/items/{{ item.id }}/edit" class="text-sm text-gray-400 hover:text-gray-200">Edit</a>
                    <button hx-delete="/items/{{ item.id }}" hx-target="#item-{{ item.id }}" hx-swap="outerHTML" hx-confirm="Delete this item?" class="text-sm text-red-400 hover:text-red-300">Delete</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No items yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
