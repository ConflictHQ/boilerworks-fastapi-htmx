{% extends "layout.html" %}
{% block title %}Edit {{ product.name }} - Boilerworks{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Edit Product</h1>
<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 max-w-2xl">
    <form method="post" action="/products/{{ product.id }}">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token | default('') }}">
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1">Name</label>
            <input type="text" name="name" value="{{ product.name }}" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1">SKU</label>
            <input type="text" name="sku" value="{{ product.sku }}" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1">Price</label>
            <input type="number" name="price" step="0.01" value="{{ product.price }}" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">{{ product.description }}</textarea>
        </div>
        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-1">Category</label>
            <select name="category_id" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-indigo-500">
                <option value="">None</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex space-x-3">
            <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition-colors">Save</button>
            <a href="/products" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition-colors">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
